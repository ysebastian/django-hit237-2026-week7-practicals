<!DOCTYPE html>
<html>
<head>
    <title>Delete Book</title>
    <style>
        /* Base styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }

        /* Container and layout */
        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        h1 {
            font-size: 28px;
            color: #333;
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 3px solid #007bff;
        }

        /* Card styling */
        .card {
            background-color: #ffffff;
            padding: 25px;
            border-radius: 5px;
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
        }

        /* Message content */
        .confirm-message {
            margin-bottom: 30px;
            font-size: 16px;
            line-height: 1.6;
        }

        .confirm-message strong {
            color: #007bff;
            font-weight: bold;
        }

        /* Warning alert styling */
        .alert-warning {
            background-color: #fff3cd;
            color: #856404;
            padding: 12px;
            border-radius: 4px;
            margin-bottom: 20px;
            border-left: 4px solid #ffc107;
        }

        /* Form actions */
        .form-actions {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        /* Button styling */
        button[type="submit"],
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 5px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        /* Primary button (submit) - Danger/Delete */
        button[type="submit"] {
            background-color: #dc3545;
            color: white;
        }

        button[type="submit"]:hover {
            background-color: #c82333;
        }

        button[type="submit"]:active {
            transform: scale(0.98);
        }

        /* Secondary button (cancel link) */
        .btn-secondary {
            background-color: #6c757d;
            color: white;
        }

        .btn-secondary:hover {
            background-color: #5a6268;
            text-decoration: none;
        }

        /* Link styling */
        a {
            color: #007bff;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        .btn-secondary:hover {
            text-decoration: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Delete Book</h1>
        <div class="card">
            <div class="alert-warning">
                ⚠️ This action cannot be undone.
            </div>
            <p class="confirm-message">
                Are you sure you want to delete <strong>{{ object.title }}</strong>?
            </p>
            <div class="form-actions">
                <form method="post" style="margin: 0;">
                    {% csrf_token %}
                    <button type="submit">Confirm Delete</button>
                </form>
                <a href="{% url 'catalogue:book_list' %}" class="btn btn-secondary">Cancel</a>
            </div>
        </div>
    </div>
</body>
</html>
